[data]
dir = "./data"

[credentials.main]
cookie_file = "./data/cookies.json"

# Optional additional accounts can be named and reused by rooms.
# [credentials.captain]
# cookie_file = "./data/captain_cookies.json"
# [credentials.alt_uploader]
# cookie_file = "./data/alt_uploader_cookies.json"

[record]
credential = "main"
output_dir = "./data/recordings"
segment_time = "01:00:00"
segment_size = "2GiB"
min_segment_size = "20MiB"
qn = 10000
# CDN preference list. Use the `cdn=...` names printed by `bilive-rec check`,
# for example "cn-gotcha04". This is a preference order, not a whitelist:
# unavailable or unhealthy candidates are skipped.
cdn = []
# Delete local .flv files after Bilibili returns a confirmed submission
# (aid/bvid). This does not mean the video has passed Bilibili review.
# Keep this false unless you accept that a later review rejection may leave
# you without the local recording. Ambiguous or failed submissions are never
# cleaned.
delete_after_submit = false

[upload]
credential = "main"
line = "auto"
threads = 3
# app, web, or bcut_android
submit_api = "app"

[submit]
title = "{title} {started_at:%Y-%m-%d}"
description = "{name} 直播录像\n录制开始：{started_at:%Y-%m-%d %H:%M:%S}\n原直播间：{url}"
category_id = 171
copyright = "reprint"
# Reprint source supports the same room placeholders as title/description.
# If omitted in `run`, reprint submissions default to "{url}".
# Manual `upload` has no room context and requires an explicit literal source.
# source = "{url}"
tags = ["直播录像"]
private = false
dynamic = ""
forbid_reprint = false
charging_panel = false
close_reply = false
close_danmu = false
featured_reply = false

[pipeline]
poll_interval_s = 60
offline_grace_s = 60
backoff_s = 15
max_backoff_s = 300

[rooms.example]
url = "https://live.bilibili.com/123456"

# Per-room recording override (optional). Missing fields inherit [record].
# [rooms.example.record]
# credential = "captain"
# qn = 10000
# cdn = ["cn-gotcha04", "cn-gotcha01"]
# delete_after_submit = true

# Per-room upload override (optional). Missing fields inherit [upload].
# [rooms.example.upload]
# credential = "alt_uploader"

# Per-room submission metadata override (optional). Missing fields inherit [submit].
# [rooms.example.submit]
# category_id = 65
# tags = ["直播录像", "example"]
# private = true
