[data]
dir = "./data"

[credentials.main]
cookie_file = "./data/cookies.json"

# Optional additional accounts can be named and reused by rooms.
# [credentials.captain]
# cookie_file = "./data/captain_cookies.json"
# [credentials.alt_uploader]
# cookie_file = "./data/alt_uploader_cookies.json"

[record]
credential = "main"
output_dir = "./data/recordings"
segment_time = "01:00:00"
segment_size = "2GiB"
min_segment_size = "20MiB"
qn = 10000
cdn = []

[upload]
credential = "main"
line = "auto"
threads = 3
submit_api = "app"
tid = 171
copyright = 2
source = "直播录像"
tags = ["直播录像"]

[pipeline]
poll_interval_s = 60
offline_grace_s = 60
backoff_s = 15
max_backoff_s = 300

[[rooms]]
name = "example"
url = "https://live.bilibili.com/123456"
title = "{title}"
description = "{name} 直播录像\n原直播间：{url}"
# 房间独立账号覆盖（可选）。如果不配置，将使用全局 [record] 和 [upload] 引用的账号。
# record_credential = "captain"
# upload_credential = "alt_uploader"
